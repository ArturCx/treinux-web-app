<svg width="380" height="150" viewBox="0 0 380 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Treinux — diário de treino">
  <!-- sombra dura (riso azul), assinatura do zine -->
  <rect x="16" y="18" width="348" height="118" fill="#2b54c7"/>
  <!-- placa de papel com borda de tinta -->
  <rect x="4" y="4" width="348" height="118" fill="#f4f1ea" stroke="#1c1b18" stroke-width="5"/>
  <!-- eyebrow impresso -->
  <text x="178" y="42" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="5" fill="#77736a">DIÁRIO DE TREINO — Nº 001</text>
  <!-- wordmark -->
  <text x="178" y="92" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="700" letter-spacing="-2" fill="#1c1b18">Treinux<tspan fill="#d14b24">.</tspan></text>
  <!-- barra de anilhas decorativa -->
  <g transform="translate(118 106)">
    <rect x="0" y="7" width="120" height="3" fill="#1c1b18"/>
    <rect x="8" y="4" width="4" height="9" fill="#1c1b18"/>
    <rect x="108" y="4" width="4" height="9" fill="#1c1b18"/>
    <rect x="18" y="0" width="7" height="16" fill="#d14b24"/>
    <rect x="28" y="0" width="7" height="16" fill="#2b54c7"/>
    <rect x="85" y="0" width="7" height="16" fill="#2b54c7"/>
    <rect x="95" y="0" width="7" height="16" fill="#d14b24"/>
  </g>
</svg>
